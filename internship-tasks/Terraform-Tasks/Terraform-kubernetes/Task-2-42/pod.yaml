apiVersion: v1
kind: Pod
metadata:
  name: task-2-42-app
  namespace: ayoob-k-ibrahim
spec:
  containers:
    - name: nginx
      image: nginx:1.27
      ports:
        - containerPort: 80
      volumeMounts:
        - name: task-2-42-storage
          mountPath: /usr/share/nginx/html
  volumes:
    - name: task-2-42-storage
      persistentVolumeClaim:
        claimName: task-2-42-pvc