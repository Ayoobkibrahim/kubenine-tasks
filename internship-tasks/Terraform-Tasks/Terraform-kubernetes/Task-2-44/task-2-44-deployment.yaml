apiVersion: apps/v1
kind: Deployment

metadata:
  name: task-2-44-deployment
  namespace: ayoob-k-ibrahim

spec:
  replicas: 1

  selector:
    matchLabels:
      app: task-2-44-app

  template:
    metadata:
      labels:
        app: task-2-44-app

    spec:
      containers:
      - name: nginx
        image: nginx:latest

        ports:
        - containerPort: 80

        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 5

        startupProbe:
          httpGet:
            path: /
            port: 80
          failureThreshold: 30
          periodSeconds: 5
