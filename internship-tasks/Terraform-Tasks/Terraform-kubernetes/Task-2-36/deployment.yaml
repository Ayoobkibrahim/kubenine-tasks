apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-2-36-deployment
  namespace: ayoob-k-ibrahim
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.25
        ports:
        - containerPort: 80
