apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: task-2-45-hpa
  namespace: ayoob-k-ibrahim

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: task-2-45-app

  minReplicas: 1
  maxReplicas: 5

  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
