apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-2-43-resource-deployment
  namespace: ayoob-k-ibrahim
spec:
  replicas: 2
  selector:
    matchLabels:
      app: task-2-43-resource-app
  template:
    metadata:
      labels:
        app: task-2-43-resource-app
    spec:
      containers:
      - name: nginx
        image: nginx
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
