crds:
  enabled: false

# Use cluster prometheus-operator in `default` only — do not deploy a second operator here
prometheusOperator:
  enabled: false

prometheus:
  prometheusSpec:
    retention: 7d
    paused: false
    # CNPG PodMonitor lives in ayoob-k-ibrahim; rules in ayoob-k-ibrahim + default in ayoob-monitoring
    podMonitorNamespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - ayoob-k-ibrahim
    podMonitorSelector:
      matchLabels:
        cnpg.io/cluster: ayoob-postgres
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - ayoob-monitoring
    serviceMonitorSelectorNilUsesHelmValues: true
    ruleNamespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - ayoob-k-ibrahim
            - ayoob-monitoring
    ruleSelector:
      matchLabels:
        release: ayoob-prometheus-stack
    ruleSelectorNilUsesHelmValues: false
    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi

alertmanager:
  enabled: true
  alertmanagerSpec:
    paused: false
    resources:
      requests:
        cpu: 100m
        memory: 200Mi
      limits:
        cpu: 500m
        memory: 512Mi

grafana:
  enabled: true
  adminPassword: admin
  persistence:
    enabled: false
  sidecar:
    dashboards:
      enabled: true
    datasources:
      enabled: true

# Only CNPG rules from 10-cnpg-alerts.yaml; avoids huge default rule churn on shared cluster
defaultRules:
  create: false



