helmDefaults:
  kubeContext: ayoob-k-ibrahim@kubenine
  wait: true
  timeout: 600

repositories:
  - name: ingress-nginx
    url: https://kubernetes.github.io/ingress-nginx

  - name: jetstack
    url: https://charts.jetstack.io

  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts

  - name: grafana
    url: https://grafana.github.io/helm-charts

releases:

  # Ingress NGINX
  - name: ingress-nginx
    namespace: ingress-nginx
    chart: ingress-nginx/ingress-nginx
    version: 4.10.1

    values:
      - controller:
          service:
            type: LoadBalancer

  # cert-manager
  - name: cert-manager
    namespace: cert-manager
    chart: jetstack/cert-manager
    version: v1.14.5

    values:
      - installCRDs: true

  # Prometheus Stack
  - name: prometheus-stack
    namespace: monitoring
    chart: prometheus-community/kube-prometheus-stack
    version: 58.2.1

    values:
      - grafana:
          adminPassword: admin123

          persistence:
            enabled: true
            storageClassName: task-2-51-monitoring
            size: 10Gi

          ingress:
            enabled: true
            ingressClassName: nginx

            hosts:
              - grafana.ayoobkibrahim.online

            path: /
            pathType: Prefix

            tls:
              - secretName: task-2-51-grafana-tls
                hosts:
                  - grafana.ayoobkibrahim.online

        prometheus:
          prometheusSpec:
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: task-2-51-monitoring
                  accessModes:
                    - ReadWriteOnce

                  resources:
                    requests:
                      storage: 10Gi

  # Loki Stack
  - name: loki-stack
    namespace: loki
    chart: grafana/loki-stack
    version: 2.10.2

    values:
      - grafana:
          enabled: false

        promtail:
          enabled: false